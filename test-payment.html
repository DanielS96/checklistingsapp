<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест оплаты Telegram Stars</title>
    
    <!-- Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #ff9500;
            margin: 8px 0;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
        }
        
        .btn-buy:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-check {
            background: #f2f2f7;
            color: #007aff;
        }
        
        .btn-restore {
            background: #34c759;
            color: white;
        }
        
        .btn-test {
            background: #ff9500;
            color: white;
        }
        
        .status {
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .status.success {
            background: #e8f8ed;
            color: #34c759;
        }
        
        .status.error {
            background: #ffe5e5;
            color: #ff3b30;
        }
        
        .status.info {
            background: #e8f0fe;
            color: #007aff;
        }
        
        .log {
            background: #1c1c1e;
            color: #98c379;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .log .time {
            color: #61afef;
        }
        
        .log .error-log {
            color: #e06c75;
        }
        
        .log .success-log {
            color: #98c379;
        }
        
        .log .warn-log {
            color: #e5c07b;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .badge.ready {
            background: #e8f8ed;
            color: #34c759;
        }
        
        .badge.not-ready {
            background: #ffe5e5;
            color: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Тест оплаты Stars</h1>
            <p>Проверка Telegram Payments API</p>
        </div>
        
        <!-- Статус Telegram -->
        <div class="card">
            <h3>📱 Статус Telegram 
                <span class="badge" id="tg-badge">Проверка...</span>
            </h3>
            <div id="tg-info" style="font-size:13px;color:#666;margin-top:8px;">
                Проверяю подключение...
            </div>
        </div>
        
        <!-- Тестовые кнопки оплаты -->
        <div class="card">
            <h3>💳 Тестовые платежи</h3>
            <p style="font-size:13px;color:#666;margin-bottom:12px;">
                Нажмите для теста оплаты. Средства НЕ спишутся если отменить.
            </p>
            
            <button class="btn btn-buy" onclick="testPayment(1)" id="btn-1">
                ⭐ Тест 1 Star
            </button>
            
            <button class="btn btn-buy" onclick="testPayment(50)" id="btn-50">
                ⭐⭐ Тест 50 Stars
            </button>
            
            <button class="btn btn-buy" onclick="testPayment(100)" id="btn-100">
                ⭐⭐⭐ Тест 100 Stars
            </button>
            
            <button class="btn btn-test" onclick="testPaymentCustom()" id="btn-custom">
                🔢 Своя сумма
            </button>
        </div>
        
        <!-- Восстановление -->
        <div class="card">
            <h3>🔄 Действия</h3>
            <button class="btn btn-restore" onclick="restorePurchases()">
                Восстановить покупки
            </button>
            <button class="btn btn-check" onclick="checkAllPayments()">
                Проверить все платежи
            </button>
            <button class="btn btn-check" onclick="clearStorage()">
                Очистить localStorage
            </button>
        </div>
        
        <!-- История платежей -->
        <div class="card">
            <h3>📋 История платежей</h3>
            <div id="payment-history" style="font-size:13px;color:#666;">
                Нет платежей
            </div>
        </div>
        
        <!-- Логи -->
        <div class="card">
            <h3>📝 Логи</h3>
            <div class="log" id="log">
                <span class="time">[Запуск]</span> Ожидание инициализации...
            </div>
            <button class="btn btn-check" onclick="clearLogs()" style="margin-top:8px;">
                Очистить логи
            </button>
        </div>
    </div>
    
    <script>
        // ==========================================
        // КОНФИГУРАЦИЯ
        // ==========================================
        const WORKER_URL = 'https://your-worker.workers.dev'; // ЗАМЕНИТЕ
        
        // ==========================================
        // ЛОГГЕР
        // ==========================================
        const logEl = document.getElementById('log');
        
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error-log' : 
                            type === 'success' ? 'success-log' : 
                            type === 'warn' ? 'warn-log' : '';
            
            logEl.innerHTML += `\n<span class="time">[${time}]</span> <span class="${className}">${message}</span>`;
            logEl.scrollTop = logEl.scrollHeight;
            
            // Также в консоль
            console.log(`[${time}] ${message}`);
        }
        
        function clearLogs() {
            logEl.innerHTML = '<span class="time">[Очищено]</span> Логи очищены';
        }
        
        // ==========================================
        // TELEGRAM INIT
        // ==========================================
        let tg = null;
        let isTgReady = false;
        
        async function initTelegram() {
            log('Поиск Telegram API...');
            
            // Ждем API
            for (let i = 0; i < 50; i++) {
                if (window.Telegram?.WebApp) {
                    tg = window.Telegram.WebApp;
                    break;
                }
                await new Promise(r => setTimeout(r, 100));
            }
            
            if (!tg) {
                log('❌ Telegram API не найден', 'error');
                updateTgStatus(false, 'API не найден');
                return false;
            }
            
            log('✅ Telegram API найден', 'success');
            
            try {
                tg.ready();
                tg.expand();
                
                const userId = tg.initDataUnsafe?.user?.id || 'неизвестно';
                const username = tg.initDataUnsafe?.user?.username || 'неизвестно';
                
                log(`Пользователь: ${username} (ID: ${userId})`);
                log(`Платформа: ${tg.platform} v${tg.version}`);
                log(`Метод оплаты: ${typeof tg.openInvoice === 'function' ? '✅ доступен' : '❌ недоступен'}`, 
                    typeof tg.openInvoice === 'function' ? 'success' : 'error');
                
                isTgReady = true;
                updateTgStatus(true, `User: ${username}`);
                
                // Показываем информацию
                document.getElementById('tg-info').innerHTML = `
                    <p><b>User ID:</b> ${userId}</p>
                    <p><b>Username:</b> ${username}</p>
                    <p><b>Platform:</b> ${tg.platform} v${tg.version}</p>
                    <p><b>Language:</b> ${tg.initDataUnsafe?.user?.language_code || 'неизвестно'}</p>
                    <p><b>OpenInvoice:</b> ${typeof tg.openInvoice === 'function' ? '✅' : '❌'}</p>
                `;
                
                return true;
                
            } catch (e) {
                log(`❌ Ошибка инициализации: ${e.message}`, 'error');
                updateTgStatus(false, e.message);
                return false;
            }
        }
        
        function updateTgStatus(ready, message) {
            const badge = document.getElementById('tg-badge');
            if (ready) {
                badge.textContent = '✅ Готов';
                badge.className = 'badge ready';
            } else {
                badge.textContent = '❌ Ошибка';
                badge.className = 'badge not-ready';
            }
        }
        
        // ==========================================
        // ПЛАТЕЖИ
        // ==========================================
        
        async function testPayment(amount, customTitle = null) {
            log(`🚀 Старт тестового платежа на ${amount} Stars`);
            
            if (!isTgReady || !tg) {
                log('❌ Telegram не готов', 'error');
                alert('Telegram API не инициализирован!');
                return;
            }
            
            if (typeof tg.openInvoice !== 'function') {
                log('❌ openInvoice недоступен', 'error');
                alert('Метод оплаты недоступен в этой версии Telegram');
                return;
            }
            
            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) {
                log('❌ Нет ID пользователя', 'error');
                alert('Не удалось получить ID пользователя');
                return;
            }
            
            // Блокируем кнопки
            document.querySelectorAll('.btn-buy, .btn-test').forEach(b => b.disabled = true);
            
            const title = customTitle || `Тест ${amount} Stars`;
            const description = `Тестовый платеж на ${amount} звезд`;
            
            try {
                log(`📡 Запрос инвойса: ${title}`);
                
                const payload = JSON.stringify({
                    test: true,
                    amount: amount,
                    user_id: userId,
                    timestamp: Date.now()
                });
                
                const response = await fetch(`${WORKER_URL}/api/create-invoice`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        title: title.substring(0, 32),
                        description: description.substring(0, 255),
                        payload: payload,
                        prices: [{ label: `${amount} Stars`, amount: amount }]
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.details || error.error || 'Ошибка сервера');
                }
                
                const data = await response.json();
                
                if (!data.invoice_url) {
                    throw new Error('Нет invoice_url в ответе');
                }
                
                log(`✅ Инвойс создан`, 'success');
                log(`🔗 URL: ${data.invoice_url.substring(0, 50)}...`);
                
                // Открываем оплату
                log('📱 Открытие окна оплаты...');
                
                tg.openInvoice(data.invoice_url, async (status) => {
                    log(`💳 Статус: ${status}`, status === 'paid' ? 'success' : 'warn');
                    
                    if (status === 'paid') {
                        // Сохраняем в localStorage
                        savePayment('test_' + amount, amount, Date.now());
                        
                        log('✅ Платеж успешен!', 'success');
                        updatePaymentHistory();
                        
                        // Проверяем на сервере
                        log('🔍 Проверка платежа на сервере...');
                        await checkPayment(userId, 'test_' + amount);
                        
                    } else if (status === 'failed') {
                        log('❌ Платеж не прошел', 'error');
                    } else if (status === 'cancelled') {
                        log('🚫 Платеж отменен', 'warn');
                    }
                    
                    // Разблокируем кнопки
                    document.querySelectorAll('.btn-buy, .btn-test').forEach(b => b.disabled = false);
                });
                
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`, 'error');
                alert('Ошибка: ' + error.message);
                document.querySelectorAll('.btn-buy, .btn-test').forEach(b => b.disabled = false);
            }
        }
        
        // Свой платеж
        function testPaymentCustom() {
            const amount = prompt('Введите сумму в Stars (1-10000):', '100');
            if (!amount) return;
            
            const numAmount = parseInt(amount);
            if (isNaN(numAmount) || numAmount < 1 || numAmount > 10000) {
                alert('Введите число от 1 до 10000');
                return;
            }
            
            const title = prompt('Название (опционально):', `Тест ${numAmount} Stars`);
            testPayment(numAmount, title);
        }
        
        async function checkPayment(userId, checklistId) {
            try {
                const response = await fetch(`${WORKER_URL}/api/verify-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        checklist_id: checklistId
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Результат проверки: ${data.paid ? '✅ Оплачен' : '❌ Не оплачен'}`, 
                        data.paid ? 'success' : 'warn');
                }
            } catch (e) {
                log(`Ошибка проверки: ${e.message}`, 'error');
            }
        }
        
        async function checkAllPayments() {
            if (!isTgReady) {
                alert('Telegram не готов');
                return;
            }
            
            const userId = tg.initDataUnsafe?.user?.id;
            log('🔍 Проверка всех платежей...');
            
            try {
                const response = await fetch(`${WORKER_URL}/api/get-purchases?user_id=${userId}`);
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Найдено покупок: ${data.purchases?.length || 0}`, 'success');
                    console.log('Purchases:', data);
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`, 'error');
            }
        }
        
        // ==========================================
        // ХРАНИЛИЩЕ
        // ==========================================
        
        function savePayment(id, amount, timestamp) {
            const payments = JSON.parse(localStorage.getItem('testPayments') || '[]');
            payments.push({ id, amount, timestamp, date: new Date(timestamp).toLocaleString() });
            localStorage.setItem('testPayments', JSON.stringify(payments));
            log(`💾 Сохранено в localStorage: ${id}`, 'success');
        }
        
        function getPayments() {
            return JSON.parse(localStorage.getItem('testPayments') || '[]');
        }
        
        function updatePaymentHistory() {
            const payments = getPayments();
            const historyEl = document.getElementById('payment-history');
            
            if (payments.length === 0) {
                historyEl.innerHTML = 'Нет платежей';
                return;
            }
            
            historyEl.innerHTML = payments.map((p, i) => `
                <div style="padding:8px;margin:4px 0;background:#f9f9f9;border-radius:8px;">
                    <b>#${i + 1}</b> ${p.id} - 
                    <span style="color:#ff9500;">⭐ ${p.amount}</span>
                    <br><small>${p.date}</small>
                </div>
            `).join('');
        }
        
        async function restorePurchases() {
            log('🔄 Восстановление покупок...');
            
            if (!isTgReady) {
                alert('Telegram не готов');
                return;
            }
            
            const userId = tg.initDataUnsafe?.user?.id;
            
            try {
                const response = await fetch(`${WORKER_URL}/api/get-purchases?user_id=${userId}`);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.purchases?.length > 0) {
                        log(`✅ Восстановлено ${data.purchases.length} покупок`, 'success');
                        
                        // Сохраняем в localStorage
                        const existing = getPayments();
                        data.purchases.forEach(p => {
                            if (!existing.find(e => e.id === p.checklist_id)) {
                                existing.push({
                                    id: p.checklist_id,
                                    amount: p.amount || '?',
                                    timestamp: p.payment_date,
                                    date: new Date(p.payment_date).toLocaleString()
                                });
                            }
                        });
                        localStorage.setItem('testPayments', JSON.stringify(existing));
                        updatePaymentHistory();
                        
                        alert(`Восстановлено ${data.purchases.length} покупок`);
                    } else {
                        log('Нет покупок для восстановления', 'warn');
                        alert('Нет сохраненных покупок');
                    }
                }
            } catch (e) {
                log(`Ошибка: ${e.message}`, 'error');
            }
        }
        
        function clearStorage() {
            if (confirm('Очистить все данные о платежах?')) {
                localStorage.removeItem('testPayments');
                updatePaymentHistory();
                log('🗑 localStorage очищен', 'warn');
            }
        }
        
        // ==========================================
        // ЗАПУСК
        // ==========================================
        
        async function start() {
            log('🚀 Запуск тестовой страницы');
            
            const ready = await initTelegram();
            
            if (ready) {
                log('✅ Система готова к тестированию', 'success');
            } else {
                log('⚠️ Работаем в режиме браузера (без Telegram)', 'warn');
            }
            
            updatePaymentHistory();
        }
        
        // Запускаем
        start();
    </script>
</body>
</html>
