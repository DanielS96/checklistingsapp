<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Checklistings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            padding: 20px;
            color: #333;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 28px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .stat-card .number { font-size: 32px; font-weight: 800; }
        .stat-card .label { font-size: 13px; color: #666; margin-top: 4px; }
        
        .revenue { background: linear-gradient(135deg, #ff9500, #ff6b00); color: white; }
        .revenue .number { color: white; }
        .revenue .label { color: rgba(255,255,255,0.8); }
        
        .blue { background: linear-gradient(135deg, #007aff, #5856d6); color: white; }
        .blue .number { color: white; }
        .blue .label { color: rgba(255,255,255,0.8); }
        
        .green { background: linear-gradient(135deg, #34c759, #30b350); color: white; }
        .green .number { color: white; }
        .green .label { color: rgba(255,255,255,0.8); }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card h3 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        .ranking-list { }
        
        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            transition: all 0.2s ease;
        }
        
        .ranking-item:hover {
            background: #f0f0f5;
            transform: translateX(4px);
        }
        
        .ranking-position {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
        }
        
        .position-1 { background: linear-gradient(135deg, #ffd700, #ffb800); }
        .position-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); }
        .position-3 { background: linear-gradient(135deg, #cd7f32, #b8702e); }
        .position-other { background: #e0e0e0; color: #666; }
        
        .ranking-info {
            flex: 1;
            min-width: 0;
        }
        
        .ranking-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .ranking-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ranking-bar {
            flex: 1;
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .ranking-fill {
            height: 100%;
            background: linear-gradient(90deg, #007aff, #34c759);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .ranking-stats {
            text-align: right;
            flex-shrink: 0;
        }
        
        .ranking-sales {
            font-size: 15px;
            font-weight: 700;
            color: #333;
        }
        
        .ranking-revenue {
            font-size: 12px;
            color: #ff9500;
            font-weight: 600;
        }
        
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            height: 200px;
            padding: 20px 0;
        }
        
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .bar {
            width: 100%;
            max-width: 60px;
            background: linear-gradient(180deg, #007aff, #5856d6);
            border-radius: 8px 8px 0 0;
            transition: height 0.3s ease;
            min-height: 4px;
        }
        
        .bar-label {
            font-size: 11px;
            color: #666;
            text-align: center;
        }
        
        .bar-value {
            font-size: 13px;
            font-weight: 700;
            color: #333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px 12px;
            text-align: left;
            font-size: 14px;
        }
        
        th {
            background: #f2f2f7;
            font-weight: 600;
            color: #666;
        }
        
        th:first-child { border-radius: 10px 0 0 10px; }
        th:last-child { border-radius: 0 10px 10px 0; }
        
        tr { border-bottom: 1px solid #f2f2f7; }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Checklistings</h1>
                <p>Админ-панель</p>
            </div>
            <button class="btn" style="background:rgba(255,255,255,0.2);color:white;" onclick="loadData()">🔄 Обновить</button>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div class="card">
            <h3>🏆 Рейтинг чек-листов</h3>
            <div class="ranking-list" id="ranking"></div>
        </div>
        
        <div class="grid-2">
            <div class="card">
                <h3>📅 Продажи по дням</h3>
                <div id="sales-by-day"></div>
            </div>
            <div class="card">
                <h3>👥 Последние покупатели</h3>
                <div id="recent-users"></div>
            </div>
        </div>
    </div>
    
    <script>
        const WORKER_URL = 'https://checklistings.dan-svistunov.workers.dev';
        let allData = null;
        
        async function loadData() {
            showLoading();
            try {
                const response = await fetch(`${WORKER_URL}/api/admin/stats`);
                allData = await response.json();
                renderAll();
            } catch (e) {
                console.error('Error:', e);
                alert('Ошибка загрузки данных');
            }
        }
        
        function showLoading() {
            ['stats', 'ranking', 'sales-by-day', 'recent-users'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '<div class="empty">Загрузка...</div>';
            });
        }
        
        function renderAll() {
            renderStats();
            renderRanking();
            renderSalesByDay();
            renderRecentUsers();
        }
        
        function renderStats() {
            const d = allData;
            const conversionRate = d.total_users > 0 
                ? Math.round((d.unique_buyers / d.total_users) * 100) 
                : 0;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card blue">
                    <div class="number">${d.total_users || 0}</div>
                    <div class="label">Всего пользователей</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#007aff;">${d.unique_buyers || 0}</div>
                    <div class="label">Покупателей</div>
                </div>
                <div class="stat-card revenue">
                    <div class="number">${d.total_revenue || 0} ⭐</div>
                    <div class="label">Заработано</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#ff9500;">${d.total_sales || 0}</div>
                    <div class="label">Всего продаж</div>
                </div>
                <div class="stat-card green">
                    <div class="number">${conversionRate}%</div>
                    <div class="label">Конверсия</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#5856d6;">${d.avg_spent || 0} ⭐</div>
                    <div class="label">Средний чек</div>
                </div>
            `;
        }
        
        function renderRanking() {
            const checklists = (allData.checklists || [])
                .sort((a, b) => b.sales - a.sales);
            
            if (checklists.length === 0) {
                document.getElementById('ranking').innerHTML = '<div class="empty">Нет продаж</div>';
                return;
            }
            
            const maxSales = checklists[0].sales;
            
            document.getElementById('ranking').innerHTML = checklists.map((cl, i) => {
                const position = i + 1;
                const percent = Math.round((cl.sales / maxSales) * 100);
                
                let posClass = 'position-other';
                let medal = '';
                if (position === 1) { posClass = 'position-1'; medal = '🥇'; }
                else if (position === 2) { posClass = 'position-2'; medal = '🥈'; }
                else if (position === 3) { posClass = 'position-3'; medal = '🥉'; }
                
                return `
                    <div class="ranking-item">
                        <div class="ranking-position ${posClass}">
                            ${position <= 3 ? medal : position}
                        </div>
                        <div class="ranking-info">
                            <div class="ranking-title">${cl.title || cl.checklist_id}</div>
                            <div class="ranking-bar-wrapper">
                                <div class="ranking-bar">
                                    <div class="ranking-fill" style="width:${percent}%"></div>
                                </div>
                                <span style="font-size:11px;color:#999;">${percent}%</span>
                            </div>
                        </div>
                        <div class="ranking-stats">
                            <div class="ranking-sales">${cl.sales} шт.</div>
                            <div class="ranking-revenue">${cl.revenue || 0} ⭐</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderSalesByDay() {
            const byDay = allData.sales_by_day || [];
            
            if (byDay.length === 0) {
                document.getElementById('sales-by-day').innerHTML = '<div class="empty">Нет данных</div>';
                return;
            }
            
            const maxValue = Math.max(...byDay.map(d => d.count));
            
            document.getElementById('sales-by-day').innerHTML = `
                <div class="bar-chart">
                    ${byDay.slice(-7).map(day => {
                        const height = maxValue > 0 ? Math.max(10, (day.count / maxValue) * 150) : 10;
                        return `
                            <div class="bar-item">
                                <div class="bar-value">${day.count}</div>
                                <div class="bar" style="height:${height}px;"></div>
                                <div class="bar-label">${day.date}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }
        
        function renderRecentUsers() {
            const users = allData.recent_buyers || [];
            
            if (users.length === 0) {
                document.getElementById('recent-users').innerHTML = '<div class="empty">Нет покупателей</div>';
                return;
            }
            
            document.getElementById('recent-users').innerHTML = `
                <table>
                    <tr>
                        <th>User ID</th>
                        <th>Чек-лист</th>
                        <th>Сумма</th>
                        <th>Дата</th>
                    </tr>
                    ${users.slice(0, 10).map(u => `
                        <tr>
                            <td>${u.user_id}</td>
                            <td>${u.checklist_title || u.checklist_id}</td>
                            <td>${u.amount} ⭐</td>
                            <td>${u.date}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }
        
        loadData();
    </script>
</body>
</html>
