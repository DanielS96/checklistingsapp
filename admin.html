<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Checklistings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            padding: 20px;
            color: #333;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 28px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .stat-card .number { font-size: 32px; font-weight: 800; }
        .stat-card .label { font-size: 13px; color: #666; margin-top: 4px; }
        
        .revenue { background: linear-gradient(135deg, #ff9500, #ff6b00); color: white; }
        .revenue .number { color: white; }
        .revenue .label { color: rgba(255,255,255,0.8); }
        
        .success { background: linear-gradient(135deg, #34c759, #30b350); color: white; }
        .success .number { color: white; }
        .success .label { color: rgba(255,255,255,0.8); }
        
        .danger { background: linear-gradient(135deg, #ff3b30, #ff2d55); color: white; }
        .danger .number { color: white; }
        .danger .label { color: rgba(255,255,255,0.8); }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card h3 { font-size: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 10px 12px;
            text-align: left;
            font-size: 14px;
        }
        
        th {
            background: #f2f2f7;
            font-weight: 600;
            color: #666;
        }
        
        th:first-child { border-radius: 10px 0 0 10px; }
        th:last-child { border-radius: 0 10px 10px 0; }
        
        tr { border-bottom: 1px solid #f2f2f7; }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-hot { background: #ffe5e5; color: #ff3b30; }
        .badge-good { background: #e8f8ed; color: #34c759; }
        .badge-neutral { background: #f2f2f7; color: #666; }
        
        .progress-bar {
            height: 8px;
            background: #f2f2f7;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007aff, #34c759);
            border-radius: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            background: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
        }
        
        .tab.active {
            background: #007aff;
            color: white;
        }
        
        .chart-container { margin-top: 16px; }
        
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            height: 200px;
            padding: 20px 0;
        }
        
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .bar {
            width: 100%;
            max-width: 60px;
            background: linear-gradient(180deg, #007aff, #5856d6);
            border-radius: 8px 8px 0 0;
            transition: height 0.3s ease;
            min-height: 4px;
        }
        
        .bar-label {
            font-size: 11px;
            color: #666;
            text-align: center;
        }
        
        .bar-value {
            font-size: 13px;
            font-weight: 700;
            color: #333;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary { background: #007aff; color: white; }
        .btn-ghost { background: #f2f2f7; color: #007aff; }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Checklistings</h1>
                <p>Админ-панель статистики</p>
            </div>
            <button class="btn" style="background:rgba(255,255,255,0.2);color:white;" onclick="loadData()">🔄</button>
        </div>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('overview')">Обзор</button>
            <button class="tab" onclick="showTab('sales')">Продажи</button>
            <button class="tab" onclick="showTab('users')">Пользователи</button>
        </div>
        
        <!-- Обзор -->
        <div id="tab-overview">
            <div class="stats" id="stats"></div>
            
            <div class="grid-2">
                <div class="card">
                    <h3>📈 Топ чек-листов</h3>
                    <div id="top-checklists"></div>
                </div>
                <div class="card">
                    <h3>📅 Продажи по дням</h3>
                    <div id="sales-by-day"></div>
                </div>
            </div>
        </div>
        
        <!-- Продажи -->
        <div id="tab-sales" style="display:none;">
            <div class="card">
                <h3>📋 Детализация по категориям</h3>
                <div id="categories"></div>
            </div>
        </div>
        
        <!-- Пользователи -->
        <div id="tab-users" style="display:none;">
            <div class="card">
                <h3>👥 Последние покупатели</h3>
                <div id="recent-users"></div>
            </div>
        </div>
    </div>
    
    <script>
        const WORKER_URL = 'https://checklistings.dan-svistunov.workers.dev';
        let allData = null;
        
        async function loadData() {
            showLoading();
            try {
                const response = await fetch(`${WORKER_URL}/api/admin/stats`);
                allData = await response.json();
                renderAll();
            } catch (e) {
                console.error('Error:', e);
                alert('Ошибка загрузки данных');
            }
        }
        
        function showLoading() {
            ['stats', 'top-checklists', 'sales-by-day', 'categories', 'recent-users'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '<div class="empty">Загрузка...</div>';
            });
        }
        
        function renderAll() {
            renderStats();
            renderTopChecklists();
            renderSalesByDay();
            renderCategories();
            renderRecentUsers();
        }
        
        function renderStats() {
            const d = allData;
            
            // Конверсия: сколько пользователей купили / сколько открывали
            const conversionRate = d.unique_openers > 0 
                ? Math.round((d.unique_buyers / d.unique_openers) * 100) 
                : 0;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="number" style="color:#007aff;">${d.total_sales || 0}</div>
                    <div class="label">Всего продаж</div>
                </div>
                <div class="stat-card revenue">
                    <div class="number">${d.total_revenue || 0} ⭐</div>
                    <div class="label">Заработано звезд</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#5856d6;">${d.unique_buyers || 0}</div>
                    <div class="label">Покупателей</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#ff9500;">${d.unique_openers || 0}</div>
                    <div class="label">Открывали чек-листы</div>
                </div>
                <div class="stat-card ${conversionRate > 30 ? 'success' : ''}">
                    <div class="number">${conversionRate}%</div>
                    <div class="label">Конверсия</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#34c759;">${d.avg_spent || 0} ⭐</div>
                    <div class="label">Средний чек</div>
                </div>
            `;
        }
        
        function renderTopChecklists() {
            const checklists = (allData.checklists || [])
                .sort((a, b) => b.sales - a.sales)
                .slice(0, 5);
            
            if (checklists.length === 0) {
                document.getElementById('top-checklists').innerHTML = '<div class="empty">Нет продаж</div>';
                return;
            }
            
            const maxSales = checklists[0].sales;
            
            document.getElementById('top-checklists').innerHTML = checklists.map((cl, i) => {
                const percent = Math.round((cl.sales / maxSales) * 100);
                const badge = i === 0 ? 'badge-hot' : i < 3 ? 'badge-good' : 'badge-neutral';
                
                return `
                    <div style="margin-bottom:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                            <span style="font-size:13px;font-weight:500;">${i+1}. ${cl.title}</span>
                            <span class="badge ${badge}">${cl.sales} шт.</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderSalesByDay() {
            const byDay = allData.sales_by_day || [];
            
            if (byDay.length === 0) {
                document.getElementById('sales-by-day').innerHTML = '<div class="empty">Нет данных</div>';
                return;
            }
            
            const maxValue = Math.max(...byDay.map(d => d.count));
            
            document.getElementById('sales-by-day').innerHTML = `
                <div class="bar-chart">
                    ${byDay.slice(-7).map(day => {
                        const height = maxValue > 0 ? Math.max(10, (day.count / maxValue) * 150) : 10;
                        return `
                            <div class="bar-item">
                                <div class="bar-value">${day.count}</div>
                                <div class="bar" style="height:${height}px;"></div>
                                <div class="bar-label">${day.date}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }
        
        function renderCategories() {
            const categories = allData.categories || [];
            
            if (categories.length === 0) {
                document.getElementById('categories').innerHTML = '<div class="empty">Нет данных о продажах</div>';
                return;
            }
            
            document.getElementById('categories').innerHTML = categories.map(cat => `
                <div style="margin-bottom:20px;">
                    <div style="font-weight:700;font-size:16px;margin-bottom:8px;">${cat.icon || ''} ${cat.title}</div>
                    <div style="font-size:13px;color:#666;margin-bottom:8px;">
                        Продаж: ${cat.total_sales} | Выручка: ${cat.total_revenue} ⭐
                    </div>
                    <table>
                        <tr>
                            <th>Чек-лист</th>
                            <th>Продажи</th>
                            <th>Выручка</th>
                        </tr>
                        ${cat.checklists.map(cl => `
                            <tr>
                                <td>${cl.title}</td>
                                <td><span class="badge ${cl.sales > 0 ? 'badge-good' : 'badge-neutral'}">${cl.sales} шт.</span></td>
                                <td>${cl.revenue} ⭐</td>
                            </tr>
                        `).join('')}
                    </table>
                </div>
            `).join('');
        }
        
        function renderRecentUsers() {
            const users = allData.recent_buyers || [];
            
            if (users.length === 0) {
                document.getElementById('recent-users').innerHTML = '<div class="empty">Нет покупателей</div>';
                return;
            }
            
            document.getElementById('recent-users').innerHTML = `
                <table>
                    <tr>
                        <th>User ID</th>
                        <th>Чек-лист</th>
                        <th>Сумма</th>
                        <th>Дата</th>
                    </tr>
                    ${users.map(u => `
                        <tr>
                            <td>${u.user_id}</td>
                            <td>${u.checklist_title || u.checklist_id}</td>
                            <td>${u.amount} ⭐</td>
                            <td>${u.date}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).style.display = 'block';
        }
        
        loadData();
    </script>
</body>
</html>
