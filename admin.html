<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Checklistings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            padding: 20px;
            color: #333;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
            color: #007aff;
        }
        
        .stat-card .label {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card h3 {
            font-size: 18px;
            margin-bottom: 12px;
        }
        
        .category-block {
            margin-bottom: 16px;
        }
        
        .category-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checklist-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 6px;
        }
        
        .checklist-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .checklist-count {
            font-size: 14px;
            font-weight: 700;
            color: #34c759;
            background: rgba(52,199,89,0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .checklist-count.zero {
            color: #999;
            background: #f2f2f7;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f2f2f7;
            border-radius: 10px;
            margin-top: 8px;
            font-weight: 700;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #007aff;
            color: white;
        }
        
        .btn-ghost {
            background: #f2f2f7;
            color: #007aff;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .revenue {
            background: linear-gradient(135deg, #ff9500, #ff6b00);
            color: white;
        }
        
        .revenue .number { color: white; }
        .revenue .label { color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Админка Checklistings</h1>
            <p>Статистика продаж чек-листов</p>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div class="card">
            <h3>📋 Продажи по категориям</h3>
            <div id="categories"></div>
        </div>
        
        <div style="text-align:center;margin-top:16px;">
            <button class="btn btn-primary" onclick="loadData()">🔄 Обновить</button>
        </div>
    </div>
    
    <script>
        const WORKER_URL = 'https://checklistings.dan-svistunov.workers.dev';
        
        async function loadData() {
            document.getElementById('stats').innerHTML = '<div class="loading">Загрузка...</div>';
            document.getElementById('categories').innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${WORKER_URL}/api/admin/stats`);
                const data = await response.json();
                renderStats(data);
                renderCategories(data);
            } catch (e) {
                console.error('Error:', e);
                alert('Ошибка загрузки данных');
            }
        }
        
        function renderStats(data) {
            const totalSales = data.total_sales || 0;
            const totalRevenue = data.total_revenue || 0;
            const totalChecklists = data.total_checklists || 0;
            const paidChecklists = data.paid_checklists || 0;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="number">${totalSales}</div>
                    <div class="label">Всего продаж</div>
                </div>
                <div class="stat-card revenue">
                    <div class="number">${totalRevenue} ⭐</div>
                    <div class="label">Заработано звезд</div>
                </div>
                <div class="stat-card">
                    <div class="number">${paidChecklists}/${totalChecklists}</div>
                    <div class="label">Платных чек-листов</div>
                </div>
                <div class="stat-card">
                    <div class="number">${data.unique_users || 0}</div>
                    <div class="label">Уникальных пользователей</div>
                </div>
            `;
        }
        
        function renderCategories(data) {
            const categories = data.categories || [];
            
            if (categories.length === 0) {
                document.getElementById('categories').innerHTML = '<p style="color:#999;text-align:center;padding:20px;">Нет данных о продажах</p>';
                return;
            }
            
            document.getElementById('categories').innerHTML = categories.map(cat => `
                <div class="category-block">
                    <div class="category-title">${cat.icon} ${cat.title}</div>
                    ${cat.checklists.map(cl => `
                        <div class="checklist-row">
                            <span class="checklist-name">${cl.title}</span>
                            <span class="checklist-count ${cl.sales === 0 ? 'zero' : ''}">${cl.sales} шт.</span>
                        </div>
                    `).join('')}
                    <div class="total-row">
                        <span>Всего в категории</span>
                        <span>${cat.total_sales} шт. (${cat.total_revenue} ⭐)</span>
                    </div>
                </div>
            `).join('');
        }
        
        loadData();
    </script>
</body>
</html>
