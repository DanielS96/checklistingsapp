<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Checklist App</title>
</head>
<body>

  <h1>Premium Checklist</h1>

  <button onclick="pay()">Оплатить 100 ⭐</button>

  <script>
    const WORKER_URL = "https://checklistings.dan-svistunov.workers.dev/";

    async function pay() {
      const chat_id = prompt("Telegram chat id:");

      const res = await fetch(WORKER_URL + "/pay", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id })
      });

      const data = await res.json();
      console.log(data);
    }
  </script>

</body>
</html>
