<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Checklistings</title>
  
  <!-- Telegram WebApp API -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Экран загрузки */
    #app:empty::before,
    .loading-screen {
      content: '';
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 40px 20px;
      text-align: center;
      background: #f2f2f7;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
    }
    
    .loading-spinner {
      width: 44px;
      height: 44px;
      margin-bottom: 20px;
      position: relative;
    }
    
    .loading-ring {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(0, 122, 255, 0.15);
      border-top: 3px solid #007aff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      box-sizing: border-box;
    }
    
    .loading-emoji {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      line-height: 1;
    }
    
    .loading-title {
      font-size: 20px;
      font-weight: 700;
      color: #1c1c1e;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    
    .loading-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 16px;
    }
    
    .loading-dots span {
      width: 6px;
      height: 6px;
      background: #007aff;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="loading-spinner">
        <div class="loading-ring"></div>
        <div class="loading-emoji">📋</div>
      </div>
      <p class="loading-title">Checklistings</p>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  
  <!-- Принудительная инициализация Telegram для iOS -->
  <script>
    (function() {
      var ready = false;
      
      function initTg() {
        if (ready) return;
        if (!window.Telegram || !window.Telegram.WebApp) return;
        
        try {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          
          // Устанавливаем цвет фона
          document.body.style.backgroundColor = window.Telegram.WebApp.backgroundColor || '#f2f2f7';
          
          ready = true;
          console.log('✅ Telegram ready from index');
        } catch(e) {
          console.log('Telegram init retry:', e);
        }
      }
      
      // Пробуем сразу
      initTg();
      
      // И повторяем каждые 200мс первые 5 секунд
      var attempts = 0;
      var interval = setInterval(function() {
        attempts++;
        initTg();
        if (attempts > 25 || ready) clearInterval(interval);
      }, 200);
      
      // Обработка ошибок
      window.onerror = function(msg, url, line) {
        console.error('Error:', msg, url, line);
        var app = document.getElementById('app');
        if (app && app.children.length === 1 && app.children[0].classList.contains('loading-screen')) {
          app.innerHTML = '<div style="padding:40px;text-align:center;"><p style="color:#ff3b30;">⚠️ Ошибка загрузки</p><p style="color:#666;font-size:14px;">Проверьте соединение и перезапустите приложение</p></div>';
        }
      };
      
      // Таймаут — если через 8 секунд всё ещё загрузка
      setTimeout(function() {
        if (!ready) {
          var app = document.getElementById('app');
          if (app && app.children.length === 1 && app.children[0].classList.contains('loading-screen')) {
            app.innerHTML = '<div style="padding:40px;text-align:center;"><p style="color:#666;">Загрузка занимает больше времени...</p><button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;background:#007aff;color:white;border:none;border-radius:10px;font-size:14px;">🔄 Обновить</button></div>';
          }
        }
      }, 8000);
    })();
  </script>
  
  <script type="module" src="js/app.js"></script>
  
  <footer style="text-align:center;padding:20px 16px;font-size:12px;color:#999;line-height:1.6;">
    © 2024 Checklistings<br>
    All rights reserved.<br>
    All materials are intellectual property.
  </footer>
</body>
</html>
